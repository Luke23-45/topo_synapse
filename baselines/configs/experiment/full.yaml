# Z3 Baseline Study — Full Experiment
# 5 backbones × all registered datasets × 3 seeds
#
# Backbones: MLP, TCN, PTv3, SNN, Deep Hodge
# Datasets: synthetic, + any registered in synapse.dataset.registry
#
# Usage:
#   python -m synapse.baselines.run_experiment --config configs/experiment/full.yaml --backbones all
#   python -m synapse.baselines.run_experiment --config configs/experiment/full.yaml --backbones mlp deep_hodge --seeds 5

backbone: mlp
seed: 42
experiment_name: z3_baseline_full

model:
  d_model: 64
  hidden_dim: 64
  num_layers: 2
  num_heads: 4
  ffn_ratio: 4
  dropout: 0.1
  k: 16
  num_scales: 3
  max_proxy_points: 16
  K: 8
  r: 1
  lam: 0.5
  drop_path: 0.1
  k_neighbors: 16
  use_coords: true
  kernel_size: 3

training:
  max_epochs: 50
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 500
  early_stopping_patience: 10
  gradient_clip_norm: 1.0
  use_amp: false
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  compile_model: false
  fused_adamw: true
  save_checkpoints: true

loss:
  proxy_weight: 0.0
  sparsity_weight: 0.0
  aux_ramp_start: 2
  aux_ramp_end: 10

stats:
  num_seeds: 3
  significance_level: 0.05
  confidence_level: 0.95
  num_bootstrap_samples: 10000

rollout:
  n_steps: 10
  noise_scale: 0.1
  max_samples: 50

# ═══════════════════════════════════════════════════════════
# DATASETS: Each can override modality, input_dim, batch_size, etc.
# ═══════════════════════════════════════════════════════════
datasets:
  - name: synthetic
    modality: temporal
    source: synthetic
    input_dim: 2
    sequence_length: 128
    num_classes: 4
    train_size: 512
    val_size: 128
    test_size: 128
    noise_std: 0.03
    batch_size_override: null

  # Example: add more datasets by registering adapters in synapse.dataset.registry
  # - name: telecom
  #   modality: temporal
  #   source: synthetic
  #   input_dim: 4
  #   sequence_length: 256
  #   num_classes: 6
  #   train_size: 1024
  #   val_size: 256
  #   test_size: 256
  #   noise_std: 0.05
  #   batch_size_override: 64

output_dir: outputs/baselines
