# Verification Experiment Configuration
# Each top-level key is an experiment codename.
# Parameters here replace the hardcoded values previously scattered across scripts.

VZ3-01:
  experiment_name: "Relaxed Selector Feasibility"
  formal_reference: "Z3 §5"
  claim: "Relaxed selector outputs satisfy box, budget, first-step, and refractory constraints."
  script: "verification/src/relaxed_selector.py"
  params:
    grid:
      T: [12, 24]
      K: [3, 5]
      r: [1, 2]
    lam: 0.5
    solver: "osqp"
    tolerance: 1.0e-6
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 64

VZ3-02:
  experiment_name: "Hard Projection Determinism"
  formal_reference: "Z3 §6"
  claim: "Hard projection is deterministic, ordered, budgeted, and refractory-separated."
  script: "verification/src/hard_projection.py"
  params:
    K: 3
    r: 1
    patterns:
      - [0.0, 0.8, 0.4, 0.7, 0.2, 0.9]
      - [0.0, 0.5, 0.5, 0.5, 0.1, 0.1]
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 64

VZ3-03:
  experiment_name: "Encoder and Saliency Causality"
  formal_reference: "Z3 §4 and §10"
  claim: "Prefix saliency is unaffected by perturbing the unseen future."
  script: "verification/src/encoder_saliency.py"
  params:
    max_history_tokens: 48
    prefix: 24
    perturbation: 100.0
    atol: 1.0e-5
    seed: 17
    input_dim: 2
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 48

VZ3-04:
  experiment_name: "Full Operator Separation and Boundedness"
  formal_reference: "Z3 §13 and §10"
  claim: "Exact audit and proxy remain separated; audit anchor count is bounded by K."
  script: "verification/src/full_operator.py"
  params:
    grid:
      T: [32, 48]
      K: [4, 8]
      r: [1, 2]
    input_dim: 2
    seed_offset: 0
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 64

VZ3-05:
  experiment_name: "Anchor Geometry Readout"
  formal_reference: "Z3 §7-§9"
  claim: "Exact audit emits projected anchor vectors and a k-dimensional topology cloud."
  script: "verification/src/anchor_geometry_readout.py"
  params:
    k: 12
    max_history_tokens: 40
    seed: 11
    input_dim: 2
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 12
    max_history_tokens: 40

VZ3-06:
  experiment_name: "Exact Audit Determinism"
  formal_reference: "Z3 exact audit definition"
  claim: "Repeated exact audits on the same sequence agree exactly up to numeric tolerance."
  script: "verification/src/exact_recovery.py"
  params:
    max_history_tokens: 36
    num_segments: 6
    seed: 101
    tolerance: 1.0e-8
    input_dim: 2
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 36

VZ3-07:
  experiment_name: "Topological Stability"
  formal_reference: "Z3 §9"
  claim: "Small perturbations induce bounded movement of the exact topology cloud."
  script: "verification/src/topological_stability.py"
  params:
    max_history_tokens: 40
    seed: 77
    noise_seed: 88
    noise_std: 0.05
    input_dim: 2
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 40

VZ3-08:
  experiment_name: "Proxy and Readout Distinction"
  formal_reference: "Z3 §13 and §12"
  claim: "Proxy features are not the downstream prediction; the readout remains a separate learned map."
  script: "verification/src/sufficiency_metric.py"
  params:
    max_history_tokens: 32
    batch_size: 2
    input_dim: 2
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 32
