# Z3 TelecomTS Dataset
# Source: https://huggingface.co/datasets/AliMaatouk/TelecomTS
# 32,000 samples from a live 5G network. Multivariate time-series
# (signal strength, latency, packet loss, + 3 derived features).
# Z3 alignment: CausalEventEncoder, temporal persistence diagrams.

name: telecom
