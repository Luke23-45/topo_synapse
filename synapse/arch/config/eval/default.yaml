# Default evaluation configuration
# =================================
# Config for evaluating trained Z3 SYNAPSE models

defaults:
  - dataset: synthetic
  - hydra: default

# Experiment metadata
experiment:
  name: synapse_z3_evaluation
  tags: ["z3", "synapse", "evaluation"]
  group: default

# Model architecture (must match training checkpoint)
model:
  input_dim: 2
  output_dim: 4
  hidden_dim: 64
  d_model: 64
  num_heads: 4
  num_layers: 2
  ffn_ratio: 4
  dropout: 0.1
  K: 8
  r: 1
  lam: 0.5
  Q: 1
  k: 16
  num_scales: 3
  num_eigs: 4
  max_proxy_points: 16
  tau: 1e-4
  max_history_tokens: 128
  task: classification

# Data configuration
data:
  dataset: synthetic
  data_root: null
  max_samples: null
  num_workers: 0
  pin_memory: true

# Execution configuration
execution:
  seed: 7
  deterministic: false

# Evaluation configuration
evaluation:
  # Modality-specific evaluation
  modality: null  # auto-detect from dataset
  # Robustness sweeps
  robustness:
    noise_sweep:
      enabled: true
      levels: [0.0, 0.01, 0.02, 0.05, 0.1]
    length_sweep:
      enabled: true
      lengths: [32, 64, 128, 256]
    rotation_sweep:
      enabled: true
      angles_rad: [0.0, 0.26, 0.52, 0.79, 1.05]
  # Rollout evaluation
  rollout:
    enabled: true
    n_steps: 10
    noise_scale: 0.05
    max_batches: 10

# Checkpoint to evaluate
checkpoint:
  path: null  # required: path to .pt checkpoint

# Output configuration
output:
  dir: synapse_outputs/eval
  save_json: true
  save_markdown: true
