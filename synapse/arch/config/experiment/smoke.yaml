# Telecom Evaluation Configuration (5 Epochs)
# ==========================================

experiment:
  name: synapse_z3_telecom_eval
  tags: ["z3", "synapse", "telecom", "real-data"]
  group: evaluation

model:
  input_dim: 16
  output_dim: 5
  hidden_dim: 64
  d_model: 64
  num_heads: 4
  num_layers: 2
  ffn_ratio: 4
  dropout: 0.1
  K: 16
  r: 2
  lam: 0.5
  Q: 1
  k: 32
  num_scales: 3
  num_eigs: 8
  max_proxy_points: 32
  tau: 1e-4
  max_history_tokens: 256
  task: classification
  loss: cross_entropy
  proxy_weight: 1.0

training:
  batch_size: 32
  epochs: 5
  learning_rate: 0.0005
  weight_decay: 0.0001
  warmup_steps: 50
  gradient_clip_norm: 1.0
  early_stopping_patience: 10
  use_amp: true
  fused_adamw: true

data:
  dataset: telecom
  modality: topological
  source: internal
  input_dim: 16
  sequence_length: 256
  num_classes: 5
  train_size: 1000
  val_size: 200
  test_size: 200
  data_root: null

execution:
  seed: 42

trainer:
  accelerator: auto
  devices: 1
  precision: 32-true

logging:
  logger: csv
  project: synapse-z3
  output_dir: synapse_outputs/telecom_eval
