# PTv3 Baseline Overlay — Geometry Baseline
# Point self-attention with distance-based positional encoding.
# Overlay: only fields that differ from the base experiment config.

backbone: ptv3

model:
  num_layers: 4
  num_heads: 4
  ffn_ratio: 4
  drop_path: 0.1
  use_coords: true

loss:
  proxy_weight: 0.0
  sparsity_weight: 0.0
