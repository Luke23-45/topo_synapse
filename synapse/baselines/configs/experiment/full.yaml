# Z3 Baseline Study — Full Experiment
# 5 backbones × all registered datasets × 3 seeds
#
# Config resolution (later layers override earlier):
#   1. This base experiment YAML
#   2. Backbone overlay YAML  (configs/mlp.yaml, configs/deep_hodge.yaml, ...)
#   3. Dataset override        (input_dim, num_classes, batch_size, ...)
#   4. Seed override           (just the random seed)
#
# Backbones: MLP, TCN, PTv3, SNN, Deep Hodge
# Datasets: synthetic, + any registered in synapse.dataset.registry
#
# Usage:
#   python -m synapse.baselines.run_experiment --config configs/experiment/full.yaml --backbones all
#   python -m synapse.baselines.run_experiment --config configs/experiment/full.yaml --backbones mlp deep_hodge --seeds 5

backbone: mlp
seed: 42
experiment_name: z3_baseline_full

# Base model defaults — shared across all backbones.
# Backbone-specific overrides (e.g. num_layers for PTv3, k for Deep Hodge)
# come from the overlay YAMLs in configs/{backbone}.yaml.
model:
  d_model: 64
  hidden_dim: 64
  dropout: 0.1

training:
  max_epochs: 50
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 500
  early_stopping_patience: 10
  gradient_clip_norm: 1.0
  use_amp: false
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  compile_model: false
  fused_adamw: true
  save_checkpoints: true

# Base loss defaults — backbone overlays set proxy/sparsity weights.
loss:
  proxy_weight: 0.0
  sparsity_weight: 0.0
  aux_ramp_start: 2
  aux_ramp_end: 10

stats:
  num_seeds: 3
  significance_level: 0.05
  confidence_level: 0.95
  num_bootstrap_samples: 10000

rollout:
  n_steps: 10
  noise_scale: 0.1
  max_samples: 50

# ═══════════════════════════════════════════════════════════
# DATASETS: Each can override modality, input_dim, batch_size, num_seeds, etc.
# ═══════════════════════════════════════════════════════════
# Per-dataset num_seeds: overrides global stats.num_seeds if specified.
# Use lower seeds for quick datasets (synthetic), higher for real data.
datasets:
  - name: synthetic
    modality: temporal
    source: synthetic
    input_dim: 2
    sequence_length: 128
    num_classes: 4
    train_size: 512
    val_size: 128
    test_size: 128
    noise_std: 0.03
    batch_size_override: null
    num_seeds: 1  # Quick synthetic test - single seed is sufficient

  # TelecomTS — 5G telemetry from HuggingFace (AliMaatouk/TelecomTS)
  # Actual dimensions: input_dim=16, num_classes=3, seq_len=256
  - name: telecom
    modality: temporal
    source: huggingface
    input_dim: 16
    sequence_length: 256
    num_classes: 3
    train_size: 25600
    val_size: 3200
    test_size: 3200
    noise_std: 0.0
    batch_size_override: 64
    num_seeds: 1  # Real data needs statistical rigor

  # Photonic — 2D photonic crystal topology (cgeorgiaw/2d-photonic-topology)
  # Actual dimensions: input_dim=8, num_classes=4, seq_len=64
  - name: photonic
    modality: scientific
    source: huggingface
    input_dim: 8
    sequence_length: 64
    num_classes: 4
    train_size: 8000
    val_size: 1000
    test_size: 1000
    noise_std: 0.0
    batch_size_override: null
    num_seeds: 1  # Scientific dataset - multiple seeds for reliability

  # Spatial — 3D point clouds from SpatialLM (manycore-research/SpatialLM-Dataset)
  # Actual dimensions: input_dim=3, num_classes=15, seq_len=512
  # max_samples caps ZIP chunk downloads: 12K samples ≈ 8 chunks ≈ 2.8 GB
  # (full repo is 109 chunks / 38 GB — only download what we need)
  - name: spatial
    modality: geometric
    source: huggingface
    input_dim: 3
    sequence_length: 512
    num_classes: 15
    train_size: 9862
    val_size: 1233
    test_size: 1233
    noise_std: 0.0
    batch_size_override: null
    max_samples: 12328
    num_seeds: 1  # Large geometric dataset - full statistical analysis

output_dir: outputs/baselines

# Root directory for downloaded/prepared dataset caches.
# Uses an absolute-ish path so the cache is found regardless of CWD.
# On Colab, mount Drive and set this to /content/drive/MyDrive/data/datasets
# to persist across sessions.
data_root: data/datasets
