# SNN Baseline Overlay — Topology Baseline
# Simplicial message passing over 0- and 1-simplices.
# Overlay: only fields that differ from the base experiment config.

backbone: snn

model:
  num_layers: 4
  ffn_ratio: 4
  drop_path: 0.1
  k_neighbors: 16
  use_coords: true

loss:
  proxy_weight: 0.0
  sparsity_weight: 0.0
