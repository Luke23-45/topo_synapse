# SNN Baseline Configuration — Topology Baseline
# Simplicial message passing over 0- and 1-simplices.

backbone_type: snn
modality: geometric

model:
  d_model: 64
  num_layers: 4
  ffn_ratio: 4
  dropout: 0.1
  drop_path: 0.1
  k_neighbors: 16
  use_coords: true
  num_classes: 4

training:
  learning_rate: 1e-3
  weight_decay: 1e-4
  batch_size: 32
  epochs: 50
  warmup_steps: 500
  gradient_clip_norm: 1.0

loss:
  proxy_weight: 0.0
  sparsity_weight: 0.0
