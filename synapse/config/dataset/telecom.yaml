# TelecomTS Dataset Configuration
# ==============================
# Multivariate time series from 5G/6G network simulations.
# Features: 6 (signal strength, latency, packet loss, + 3 derived).
# Z3 alignment: CausalEventEncoder, temporal persistence diagrams.

data:
  dataset: telecom
  modality: temporal
  source: huggingface
  hf_repo: AliMaatouk/TelecomTS
  input_dim: 16
  sequence_length: 256
  num_classes: 5
  task: classification
  batch_size_override: 64
  data_root: data/datasets
