# Full cross-domain experiment configuration
# ==========================================
# Multi-dataset, multi-seed experiment for Z3 SYNAPSE
# Usage: python -m synapse.synapse.scripts.train --multirun experiment=full dataset=synthetic,telecom,spatial,photonic

defaults:
  - ../training/default

experiment:
  name: synapse_z3_cross_domain
  tags: ["z3", "synapse", "cross-domain", "full"]
  group: full

# Dataset sweep
dataset:
  - synthetic
  - telecom
  - spatial
  - photonic

# Seed sweep
execution:
  seed:
    - 42
    - 43
    - 44
    - 45
    - 46

# Training sweep
training:
  max_epochs: 50
  batch_size: 64
  learning_rate: 0.0001
