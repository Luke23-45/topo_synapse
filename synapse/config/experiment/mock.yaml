# Mock Pipeline Verification Configuration
# ==========================================

experiment:
  name: synapse_z3_mock_test
  tags: ["z3", "synapse", "mock", "test"]
  group: verification

model:
  input_dim: 2
  output_dim: 4
  hidden_dim: 32
  d_model: 32
  num_heads: 2
  num_layers: 1
  ffn_ratio: 2
  dropout: 0.1
  K: 8
  r: 2
  lam: 0.5
  Q: 1
  k: 16
  num_scales: 2
  num_eigs: 4
  max_proxy_points: 16
  tau: 1e-4
  max_history_tokens: 128
  task: classification
  loss: cross_entropy
  proxy_weight: 1.0

training:
  batch_size: 8
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0
  warmup_steps: 0
  gradient_clip_norm: 1.0
  early_stopping_patience: 3
  use_amp: false
  fused_adamw: false

data:
  dataset: synthetic
  modality: topological
  source: synthetic
  input_dim: 2
  sequence_length: 128
  num_classes: 4
  train_size: 64
  val_size: 16
  test_size: 16
  data_root: data/datasets

execution:
  seed: 42

trainer:
  accelerator: cpu
  devices: 1
  precision: 32-true

logging:
  logger: csv
  project: synapse-z3
  output_dir: synapse_outputs/mock_test
