# Synthetic dataset configuration
# ===============================
# Overrides for synthetic topology classification dataset

dataset: synthetic

data:
  train_size: 512
  val_size: 128
  test_size: 128
  noise_std: 0.03

model:
  input_dim: 2
  output_dim: 4
  max_history_tokens: 128

training:
  batch_size: 32
  max_epochs: 10
