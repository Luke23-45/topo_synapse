# No topology ablation configuration
# ===================================
# Ablation: disable topology (proxy, exact eval, anchor selection)

defaults:
  - ../training/default

ablation:
  disable_proxy: true
  disable_exact_eval: true
  disable_anchor_selection: true
  disable_topology: true

experiment:
  name: synapse_z3_ablation_no_topology
  tags: ["z3", "synapse", "ablation", "no_topology"]
