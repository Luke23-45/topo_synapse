# Photonic topology dataset evaluation config
# Modality: scientific | Task: classification

metrics:
  - accuracy
  - loss
  - top_k_accuracy
  - per_class_accuracy
  - confusion_matrix

topology:
  proxy_exact_alignment: true
  max_samples: 64

robustness:
  noise_sweep:
    enabled: true
    levels: [0.0, 0.01, 0.03, 0.05, 0.1]
  rotation_sweep:
    enabled: false
  feature_importance:
    enabled: true

reporting:
  formats:
    - json
    - markdown
  figures:
    - confusion_matrix
    - learning_curves
    - topology_alignment
    - noise_robustness
    - feature_importance

statistics:
  significance_level: 0.05
  n_bootstrap: 10000
  bonferroni_correction: true
