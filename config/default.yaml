# Z3 Topology-First Default Configuration
# Reference: §3 of docs/formal_math/z3/01_main_definition.md

# Data shape
input_dim: 2
output_dim: 4

# Network architecture
hidden_dim: 64
d_model: 64
num_heads: 4
num_layers: 2
ffn_ratio: 4
dropout: 0.1

# Anchor selection (§5–6)
K: 8
r: 1
lam: 0.5

# Topology (§9, §12)
Q: 1              # max persistent homology degree
k: 16             # latent lift dimension
num_scales: 3     # S: Gaussian kernel scales
num_eigs: 4       # J: eigenvalues per operator per scale
max_proxy_points: 16  # MAX_K: simplicial complex vertex budget
tau: 0.0001       # τ: ridge regularization

# Sequence
max_history_tokens: 64

# Task
task: classification
loss: cross_entropy
proxy_weight: 1.0

# Training
learning_rate: 0.001
weight_decay: 0.0001
batch_size: 32
epochs: 4
train_size: 128
val_size: 64
test_size: 64
noise_std: 0.03
seed: 7
