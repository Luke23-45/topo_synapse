# Z3 Full Cross-Domain Experiment
# ================================
# All evaluation tracks: Temporal × Geometric × Scientific
# Datasets: synthetic, telecom, spatial, photonic

datasets:
  - synthetic
  - telecom
  - spatial
  - photonic

# Default training parameters (overridden per-dataset by DatasetSpec)
training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001

execution:
  seed: 7

output_dir: synapse_outputs/full_cross_domain
