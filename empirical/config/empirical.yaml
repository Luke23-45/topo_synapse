# Empirical Experiment Configuration
# Each top-level key is an experiment codename.
# Parameters here replace the hardcoded values previously scattered across scripts.

EZ3-01:
  experiment_name: "Topology Value"
  formal_reference: "Z3 proxy vs exact"
  claim: "Topology-aware features should outperform uniform pooling on synthetic topology labels."
  script: "empirical/src/components/topology_value.py"
  params:
    seed: 7
    length: 64
    noise_std: 0.03
    train_size: 128
    val_size: 64
    test_size: 64
  model:
    input_dim: 2
    output_dim: 4
    K: 8
    r: 1
    Q: 1
    k: 16
    max_history_tokens: 64

EZ3-02:
  experiment_name: "Topological Stability Empirical"
