# Spatial geometry dataset evaluation config
# Modality: geometric | Task: classification

metrics:
  - accuracy
  - loss
  - top_k_accuracy
  - per_class_accuracy
  - confusion_matrix

topology:
  proxy_exact_alignment: true
  max_samples: 64

robustness:
  noise_sweep:
    enabled: false
  rotation_sweep:
    enabled: true
    angles_rad: [0.0, 0.5236, 0.7854, 1.0472, 1.5708]
  feature_importance:
    enabled: false

reporting:
  formats:
    - json
    - markdown
  figures:
    - confusion_matrix
    - learning_curves
    - topology_alignment
    - rotation_invariance

statistics:
  significance_level: 0.05
  n_bootstrap: 10000
  bonferroni_correction: true
